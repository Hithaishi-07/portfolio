<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contact Rahul Sharma - Full Stack Developer">
    <title>Contact | Rahul Sharma</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body class="bg-zinc-950 text-zinc-200">

    <!-- Navbar -->
    <header class="sticky top-0 z-50 bg-zinc-950 border-b border-zinc-800">
        <nav class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-3 text-2xl font-bold">
                <span class="text-yellow-400">R</span>ahul Sharma
            </a>
            <ul class="flex gap-8 text-sm font-medium">
                <li><a href="index.html" class="hover:text-yellow-400">Home</a></li>
                <li><a href="about.html" class="hover:text-yellow-400">About</a></li>
                <li><a href="projects.html" class="hover:text-yellow-400">Projects</a></li>
                <li><a href="contact.html" class="text-yellow-400">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main class="max-w-2xl mx-auto px-6 py-20">
        <h1 class="text-5xl font-bold mb-4">Get In Touch</h1>
        <p class="text-zinc-400 text-lg">I'd love to hear from you. Let's discuss your project!</p>

        <form id="contactForm" class="mt-12 space-y-8">
            <div>
                <label for="name" class="block mb-2 font-medium">Full Name <span class="text-red-500">*</span></label>
                <input type="text" id="name" required class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-6 py-4 focus:border-yellow-400 outline-none">
            </div>

            <div>
                <label for="email" class="block mb-2 font-medium">Email Address <span class="text-red-500">*</span></label>
                <input type="email" id="email" required class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-6 py-4 focus:border-yellow-400 outline-none">
            </div>

            <div>
                <label for="message" class="block mb-2 font-medium">Message <span class="text-red-500">*</span></label>
                <textarea id="message" rows="8" required class="w-full bg-zinc-900 border border-zinc-700 rounded-3xl px-6 py-4 focus:border-yellow-400 outline-none resize-y"></textarea>
            </div>

            <button type="submit" class="w-full bg-yellow-400 text-black font-semibold py-5 rounded-3xl hover:bg-yellow-300 transition">
                Send Message
            </button>
        </form>
    </main>

    <footer class="bg-black py-12 text-center text-sm text-zinc-500">
        <p>&copy; 2026 Rahul Sharma. All Rights Reserved.</p>
    </footer>

    <script>
        document.getElementById('contactForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert("Thank you! Your message has been received. (This is a demo)");
        });
    </script>
</body>
</html>
